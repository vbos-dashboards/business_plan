# Verifies production build. Published site files live at repo root (index.html, assets/, data/)
# and in docs/ — commit and push after `npm run build` so GitHub Pages serves the bundle.

name: Build

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'assets/**'
      - 'data/**'
      - 'docs/**'
      - 'index.html'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
