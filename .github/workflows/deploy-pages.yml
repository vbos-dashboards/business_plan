# Builds the app and writes production files to /docs on main.
# GitHub Pages: Settings → Build and deployment → Deploy from branch → main → /docs
# (Do NOT use / (root) — that serves dev index.html and causes a blank page.)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish dist to main/docs
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: main
          target-folder: docs
          clean: true
          commit-message: 'chore: publish site to docs/ [skip ci]'
